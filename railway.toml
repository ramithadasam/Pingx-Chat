# Railway monorepo config — deploys only the api-server service
[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "api-server"
source = "."

[services.build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build"

[services.deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
