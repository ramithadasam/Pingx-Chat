[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./dist/index.mjs"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[variables]
NODE_ENV = "production"
PORT = "8080"
JWT_EXPIRES_IN = "30d"
LOG_LEVEL = "info"
