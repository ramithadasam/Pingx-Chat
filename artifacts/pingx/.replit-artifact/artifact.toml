kind = "web"
previewPath = "/"
title = "PingX"
version = "1.0.0"
id = "artifacts/pingx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21913

[services.development]
run = "pnpm --filter @workspace/pingx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pingx", "run", "build" ]
publicDir = "artifacts/pingx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21913"
BASE_PATH = "/"
